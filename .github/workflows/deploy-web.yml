name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # Allow manual triggers from Actions tab

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # Generate .env file from GitHub Secrets
      # flutter_dotenv requires .env to exist as a bundled asset
      - name: Create .env file
        run: |
          echo "API_BASE_URL=${{ secrets.API_BASE_URL_PROD }}" > .env
          echo "APP_ENV=production" >> .env

      - name: Build Web (Production flavor)
        run: |
          flutter build web \
            --release \
            --target lib/main_prod.dart \
            --base-href / \
            --dart-define=API_BASE_URL=${{ secrets.API_BASE_URL_PROD }}

      # CNAME file tells GitHub Pages to use the custom domain
      - name: Add CNAME for custom domain
        run: echo "${{ vars.CUSTOM_DOMAIN }}" > build/web/CNAME

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
