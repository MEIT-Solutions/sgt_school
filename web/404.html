<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>SGT International School</title>
  <script>
    // Single Page App redirect for GitHub Pages
    // When GitHub Pages returns a 404, this script redirects to index.html
    // while preserving the original path as a query parameter.
    // index.html then restores the correct route via history.replaceState.
    var pathSegmentsToKeep = 0; // Custom domain = root path, no segments to keep
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
